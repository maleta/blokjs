<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BlokJS Todo App</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
    h1 { margin-bottom: 16px; }
    form { display: flex; gap: 8px; margin-bottom: 16px; }
    form input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    form button { padding: 8px 16px; background: #f59e0b; color: white; border: none; border-radius: 4px; cursor: pointer; }
    ul { list-style: none; }
    li { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee; }
    li.done span { text-decoration: line-through; color: #999; }
    li span { flex: 1; }
    li button { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; }
    p { margin-top: 12px; color: #666; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@maleta/blokjs@0.1.0/dist/blokjs.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    blok.component('TodoItem', {
      props: ['todo'],

      view: ($) => ({
        li: {
          class: { done: $.todo.done },
          children: [
            { input: { type: 'checkbox', model: $.todo.done } },
            { span: { text: $.todo.text } },
            { button: { click: 'remove', text: '\u00d7' } },
          ]
        }
      }),

      methods: {
        remove() { this.emit('remove', this.todo) }
      }
    })

    const app = blok.mount('#app', {
      state: { todos: [], newText: '' },

      computed: {
        remaining() {
          return this.todos.filter(t => !t.done).length
        }
      },

      methods: {
        add() {
          if (!this.newText.trim()) return
          this.todos.push({ id: Date.now(), text: this.newText.trim(), done: false })
          this.newText = ''
        },
        remove(todo) {
          this.todos = this.todos.filter(t => t !== todo)
        }
      },

      view: ($) => ({
        div: {
          class: 'app',
          children: [
            { h1: 'Todos' },
            { form: {
                submit: 'add',
                children: [
                  { input: { type: 'text', model: $.newText, placeholder: 'What needs doing?' } },
                  { button: { type: 'submit', text: 'Add' } },
                ]
              }
            },
            { ul: {
                children: [
                  { each: $.todos, as: 'todo', key: 'id', children: [
                    { TodoItem: { todo: $.todo, on_remove: 'remove' } }
                  ]}
                ]
              }
            },
            { p: { text: 'items left: ', children: [
              { span: { text: $.remaining } },
            ]}}
          ]
        }
      })
    })
  </script>
</body>
</html>
