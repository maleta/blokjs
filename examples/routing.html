<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BlokJS Routing Example - Product Catalog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .shell { max-width: 960px; margin: 0 auto; min-height: 100vh; background: #fff; }

    /* Nav */
    nav { display: flex; align-items: center; gap: 20px; padding: 14px 24px; border-bottom: 1px solid #e5e5e5; background: #fafafa; }
    nav .brand { font-weight: 700; font-size: 16px; color: #1a1a1a; text-decoration: none; }
    nav a { color: #f59e0b; text-decoration: none; font-size: 14px; }
    nav a:hover { text-decoration: underline; }

    .page { padding: 24px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 20px; }

    /* Search & filters */
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .toolbar input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
    .toolbar select { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; background: #fff; }

    /* Product grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .card { border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; transition: box-shadow 0.15s; }
    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card img { width: 100%; height: 160px; object-fit: cover; background: #f9fafb; }
    .card-body { padding: 12px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-title a { color: inherit; text-decoration: none; }
    .card-title a:hover { color: #f59e0b; }
    .card-cat { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .card-price { font-size: 16px; font-weight: 700; color: #059669; }
    .card-rating { font-size: 12px; color: #f59e0b; margin-left: 8px; }
    .card-row { display: flex; align-items: baseline; }

    /* Detail page */
    .back { display: inline-flex; align-items: center; gap: 4px; margin-bottom: 20px; color: #f59e0b; text-decoration: none; font-size: 14px; }
    .back:hover { text-decoration: underline; }
    .detail { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    .detail-img { width: 100%; border-radius: 8px; background: #f9fafb; }
    .detail-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .detail-brand { font-size: 14px; color: #6b7280; margin-bottom: 12px; }
    .detail-price { font-size: 28px; font-weight: 700; color: #059669; margin-bottom: 16px; }
    .detail-desc { font-size: 14px; line-height: 1.6; color: #374151; margin-bottom: 20px; }
    .detail-meta { font-size: 13px; color: #6b7280; line-height: 2; }
    .detail-meta b { color: #1a1a1a; font-weight: 600; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-cat { background: #ede9fe; color: #5b21b6; }
    .stars { color: #f59e0b; font-size: 16px; letter-spacing: 1px; }

    /* Loading & empty */
    .loading { text-align: center; padding: 60px 24px; color: #6b7280; }
    .empty { text-align: center; padding: 40px; color: #9ca3af; font-style: italic; }
    .not-found { text-align: center; padding: 60px 24px; color: #6b7280; }

    @media (max-width: 640px) {
      .detail { grid-template-columns: 1fr; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@maleta/blokjs/dist/blokjs.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const API = 'https://dummyjson.com'

    // --- Product card ---
    blok.component('ProductCard', {
      props: ['product'],

      view: ($) => ({
        div: {
          class: 'card',
          children: [
            { img: { bind: { src: $.product.thumbnail, alt: $.product.title } } },
            { div: { class: 'card-body', children: [
              { div: { class: 'card-cat', text: $.product.category } },
              { div: { class: 'card-title', children: [
                { a: { bind: { href: $.product._href }, link: true, text: $.product.title } },
              ]}},
              { div: { class: 'card-row', children: [
                { span: { class: 'card-price', text: '$', children: [
                  { span: { text: $.product.price } },
                ]}},
                { span: { class: 'card-rating', text: '\u2605 ', children: [
                  { span: { text: $.product.rating } },
                ]}},
              ]}},
            ]}},
          ]
        }
      })
    })

    // --- Product list page ---
    blok.component('ProductList', {
      state: { search: '', category: '' },

      computed: {
        filtered() {
          let items = this.store.catalog.products
          if (this.category) {
            items = items.filter(p => p.category === this.category)
          }
          if (this.search) {
            const q = this.search.toLowerCase()
            items = items.filter(p =>
              p.title.toLowerCase().includes(q) ||
              p.brand?.toLowerCase().includes(q)
            )
          }
          return items
        },
        hasResults() {
          return this.filtered.length > 0
        },
        resultCount() {
          return this.filtered.length
        }
      },

      view: ($) => ({
        div: {
          class: 'page',
          children: [
            { h1: 'Product Catalog' },
            { p: { class: 'subtitle', text: 'Data from ', children: [
              { a: { href: 'https://dummyjson.com', target: '_blank', text: 'dummyjson.com' } },
              { span: { text: ' \u2014 ' } },
              { span: { text: $.store.catalog.productCount } },
              { span: { text: ' products loaded' } },
            ]}},

            { when: $.store.catalog.isLoading, children: [
              { div: { class: 'loading', text: 'Loading products...' } },
            ]},

            { when: $.not.store.catalog.isLoading, children: [
              { div: { class: 'toolbar', children: [
                { input: { type: 'text', model: $.search, placeholder: 'Search products...' } },
                { select: { model: $.category, children: [
                  { option: { value: '', text: 'All categories' } },
                  { each: $.store.catalog.categories, as: 'cat', children: [
                    { option: { bind: { value: $.cat }, text: $.cat } },
                  ]},
                ]}},
              ]}},

              { when: $.hasResults, children: [
                { div: { class: 'grid', children: [
                  { each: $.filtered, as: 'product', key: 'id', children: [
                    { ProductCard: { product: $.product } },
                  ]},
                ]}},
              ]},

              { when: $.not.hasResults, children: [
                { p: { class: 'empty', text: 'No products match your search.' } },
              ]},
            ]},
          ]
        }
      })
    })

    // --- Product detail page ---
    blok.component('ProductDetail', {
      computed: {
        product() {
          const id = Number(this.route.params.id)
          return this.store.catalog.products.find(p => p.id === id) || null
        },
        stockLabel() {
          if (!this.product) return ''
          return this.product.stock > 0 ? 'In Stock (' + this.product.stock + ')' : 'Out of Stock'
        },
        stockClass() {
          if (!this.product) return ''
          return this.product.stock > 0 ? 'badge badge-green' : 'badge badge-red'
        },
        starsText() {
          if (!this.product) return ''
          const full = Math.round(this.product.rating)
          return '\u2605'.repeat(full) + '\u2606'.repeat(5 - full)
        }
      },

      view: ($) => ({
        div: {
          class: 'page',
          children: [
            { a: { href: '/', link: true, class: 'back', text: '\u2190 Back to catalog' } },

            { when: $.store.catalog.isLoading, children: [
              { div: { class: 'loading', text: 'Loading...' } },
            ]},

            { when: $.not.product, children: [
              { when: $.not.store.catalog.isLoading, children: [
                { div: { class: 'not-found', children: [
                  { h2: 'Product not found' },
                  { p: { text: 'This product does not exist.' } },
                ]}},
              ]},
            ]},

            { when: $.product, children: [
              { div: { class: 'detail', children: [
                { div: { children: [
                  { img: { class: 'detail-img', bind: { src: $.product.thumbnail, alt: $.product.title } } },
                ]}},
                { div: { children: [
                  { span: { class: 'badge badge-cat', text: $.product.category } },
                  { h1: { class: 'detail-title', text: $.product.title } },
                  { p: { class: 'detail-brand', text: $.product.brand } },
                  { div: { class: 'stars', children: [
                    { span: { text: $.starsText } },
                    { span: { style: 'color:#6b7280; font-size:13px; margin-left:6px', text: '', children: [
                      { span: { text: $.product.rating } },
                      { span: { text: ' / 5' } },
                    ]}},
                  ]}},
                  { p: { class: 'detail-price', text: '$', children: [
                    { span: { text: $.product.price } },
                  ]}},
                  { p: { class: 'detail-desc', text: $.product.description } },
                  { div: { class: 'detail-meta', children: [
                    { div: { text: '', children: [
                      { b: 'Stock: ' },
                      { span: { class: $.stockClass, text: $.stockLabel } },
                    ]}},
                    { div: { text: '', children: [
                      { b: 'SKU: ' },
                      { span: { text: $.product.sku } },
                    ]}},
                    { div: { text: '', children: [
                      { b: 'Weight: ' },
                      { span: { text: $.product.weight } },
                      { span: { text: 'g' } },
                    ]}},
                    { div: { text: '', children: [
                      { b: 'Dimensions: ' },
                      { span: { text: $.product.dimensions.width } },
                      { span: { text: ' \u00d7 ' } },
                      { span: { text: $.product.dimensions.height } },
                      { span: { text: ' \u00d7 ' } },
                      { span: { text: $.product.dimensions.depth } },
                      { span: { text: ' cm' } },
                    ]}},
                    { div: { text: '', children: [
                      { b: 'Warranty: ' },
                      { span: { text: $.product.warrantyInformation } },
                    ]}},
                    { div: { text: '', children: [
                      { b: 'Shipping: ' },
                      { span: { text: $.product.shippingInformation } },
                    ]}},
                    { div: { text: '', children: [
                      { b: 'Return policy: ' },
                      { span: { text: $.product.returnPolicy } },
                    ]}},
                  ]}},
                ]}},
              ]}},
            ]},
          ]
        }
      })
    })

    // --- Not found ---
    blok.component('NotFound', {
      view: ($) => ({
        div: { class: 'not-found', children: [
          { h1: 'Page not found' },
          { p: { text: 'The page you are looking for does not exist.' } },
          { a: { href: '/', link: true, text: 'Go home' } },
        ]}
      })
    })

    // --- Store ---
    blok.store('catalog', {
      state: {
        products: [],
        categories: [],
        isLoading: true,
        productCount: 0,
      },
    })

    // --- Mount ---
    blok.mount('#app', {
      routes: [
        { path: '/', component: 'ProductList' },
        { path: '/product/:id', component: 'ProductDetail' },
        { path: '*', component: 'NotFound' },
      ],

      mode: 'hash',

      methods: {
        async loadData() {
          try {
            const [productsRes, catsRes] = await Promise.all([
              fetch(API + '/products?limit=50'),
              fetch(API + '/products/category-list'),
            ])
            const productsData = await productsRes.json()
            const categories = await catsRes.json()

            // Add href for routing
            const products = productsData.products.map(p => ({
              ...p,
              _href: '/product/' + p.id,
            }))

            this.store.catalog.products = products
            this.store.catalog.categories = categories
            this.store.catalog.productCount = productsData.total
          } catch (e) {
            console.error('Failed to load data:', e)
          }
          this.store.catalog.isLoading = false
        }
      },

      mount() {
        this.loadData()
      },

      view: ($) => ({
        div: {
          class: 'shell',
          children: [
            { nav: { children: [
              { a: { href: '/', link: true, class: 'brand', text: 'BlokJS Store' } },
              { a: { href: '/', link: true, text: 'Catalog' } },
            ]}},
            { div: { route: true } },
          ]
        }
      })
    })
  </script>
</body>
</html>
