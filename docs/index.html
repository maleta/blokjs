<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BlokJS — Documentation</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scroll-padding-top: 24px; }
    body { font-family: system-ui, -apple-system, sans-serif; color: #1a1a1a; background: #fff; }

    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
      overflow-y: auto; padding: 24px 16px;
      border-right: 1px solid #e5e5e5; background: #fafafa;
    }
    .logo { font-size: 22px; font-weight: 800; color: #f59e0b; }
    .version { font-size: 12px; color: #999; margin-left: 6px; }
    .nav-group { margin-top: 20px; }
    .nav-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: #999; font-weight: 600; margin-bottom: 6px;
    }
    .sidebar a {
      display: block; font-size: 13px; color: #555; text-decoration: none;
      padding: 3px 0; line-height: 1.4;
    }
    .sidebar a:hover { color: #f59e0b; }

    .content {
      margin-left: 220px; flex: 1; padding: 40px 48px; max-width: 900px;
    }

    .section { margin-bottom: 48px; }
    h2 {
      font-size: 22px; font-weight: 700; margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid #eee;
    }
    h3 { font-size: 15px; font-weight: 600; margin: 24px 0 8px; color: #1a1a1a; }
    .section p { font-size: 14px; line-height: 1.7; margin-bottom: 10px; color: #333; }

    pre.code-block {
      background: #f5f5f5; border-radius: 6px; padding: 14px 16px;
      overflow-x: auto; margin: 10px 0 16px; border: 1px solid #e8e8e8;
    }
    pre.code-block code {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.8125rem; line-height: 1.6; white-space: pre;
      background: none; padding: 0; text-shadow: none;
    }
    pre.code-block[class*="language-"],
    code[class*="language-"] { background: none; text-shadow: none; }
    code.ic {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.8rem; background: #f0f0f0; padding: 1px 5px; border-radius: 3px;
    }

    table { width: 100%; border-collapse: collapse; margin: 10px 0 16px; font-size: 13px; }
    th { text-align: left; font-weight: 600; padding: 8px 10px; border-bottom: 2px solid #e5e5e5; }
    td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
    td code { font-size: 0.8rem; }
    .table-wrap { overflow-x: auto; }

    .note {
      background: #eef2ff; border-left: 3px solid #f59e0b; padding: 10px 14px;
      border-radius: 0 4px 4px 0; margin: 10px 0 16px; font-size: 13px; color: #333;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: static; width: 100%; border-right: none;
        border-bottom: 1px solid #e5e5e5; padding: 16px;
      }
      .nav-group { display: inline-block; vertical-align: top; margin-right: 24px; margin-top: 12px; }
      .content { margin-left: 0; padding: 24px 16px; }
      .layout { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/@maleta/blokjs/dist/blokjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script>
    // --- Helpers ---
    const c = (src, lang) => {
      const cls = 'language-' + (lang || (src.trimStart().startsWith('<') ? 'markup' : 'javascript'))
      return { pre: { class: 'code-block', children: [{ code: { class: cls, text: src } }] } }
    }
    const ic = t => ({ code: { class: 'ic', text: t } })
    const p = text => ({ p: text })
    const note = text => ({ div: { class: 'note', text } })
    const sub = (id, title) => ({ h3: { id, text: title } })
    const sec = (id, title, ...kids) => ({ div: { id, class: 'section', children: [{ h2: title }, ...kids] } })
    const nav = (href, text) => ({ a: { href: '#' + href, text } })
    const grp = (title, ...links) => ({ div: { class: 'nav-group', children: [{ div: { class: 'nav-title', text: title } }, ...links] } })

    const tbl = (headers, rows) => ({
      div: { class: 'table-wrap', children: [
        { table: { children: [
          { thead: { children: [{ tr: { children: headers.map(h => ({ th: h })) } }] } },
          { tbody: { children: rows.map(r => (
            { tr: { children: r.map(cell =>
              typeof cell === 'string' ? { td: cell }
              : Array.isArray(cell) ? { td: { children: cell } }
              : { td: { children: [cell] } }
            ) } }
          )) } }
        ] } }
      ] }
    })

    // --- Mount ---
    blok.mount('#app', {
      mount() { Prism.highlightAll() },
      view: ($) => ({
        div: { class: 'layout', children: [

          // ===== SIDEBAR =====
          { nav: { class: 'sidebar', children: [
            { div: { children: [
              { span: { class: 'logo', text: 'BlokJS' } },
              { span: { class: 'version', text: 'v0.1.0' } },
            ] } },

            grp('Getting Started',
              nav('introduction', 'Introduction'),
              nav('browser-support', 'Browser Support'),
              nav('quick-start', 'Quick Start'),
              nav('vite-plugin', 'Using with Vite'),
              nav('full-example', 'Full Example'),
            ),
            grp('API',
              nav('blokjs-component', 'blok.component()'),
              nav('blokjs-mount', 'blok.mount()'),
              nav('blokjs-store', 'blok.store()'),
            ),
            grp('Context',
              nav('context', 'this.*'),
            ),
            grp('Component Definition',
              nav('props', 'Props'),
              nav('state', 'State'),
              nav('computed', 'Computed'),
              nav('watch', 'Watch'),
              nav('methods', 'Methods'),
              nav('async-methods', 'Async Methods'),
              nav('lifecycle', 'Lifecycle'),
              nav('view-fn', 'View Function'),
            ),
            grp('View DSL ($)',
              nav('ref-proxy', 'Creating Refs'),
              nav('negation', 'Negation'),
              nav('iter-vars', 'Iteration Variables'),
            ),
            grp('Binding',
              nav('elements', 'Elements'),
              nav('text-bind', 'Text'),
              nav('html-binding', 'HTML'),
              nav('children', 'Children'),
              nav('classes', 'Classes'),
              nav('styles', 'Styles'),
              nav('attributes', 'Attributes'),
            ),
            grp('Interaction',
              nav('model', 'Model'),
              nav('events', 'Events'),
            ),
            grp('Control Flow',
              nav('conditionals', 'Conditionals'),
              nav('loops', 'Loops'),
            ),
            grp('Composition',
              nav('components', 'Components'),
              nav('slots', 'Slots'),
              nav('refs', 'Refs'),
            ),
            grp('Router',
              nav('router', 'Overview'),
              nav('route-outlet', 'Route Outlet'),
              nav('route-links', 'Route Links'),
              nav('route-params', 'Params & Query'),
              nav('route-guards', 'Guards'),
              nav('route-modes', 'Modes'),
            ),
            grp('Reactivity',
              nav('reactivity', 'Overview'),
              nav('array-mutations', 'Array Mutations'),
              nav('batching', 'Batching'),
            ),
            grp('Validation',
              nav('validate-api', 'validate.*'),
              nav('validate-checks', 'What Gets Caught'),
            ),
          ] } },

          // ===== CONTENT =====
          { main: { class: 'content', children: [

            // --- Introduction ---
            sec('introduction', 'Introduction',
              p('BlokJS is a tiny (~8 KB gzipped) reactive UI framework. No build step, no virtual DOM, no dependencies - just a script tag and plain JavaScript objects that describe your UI. State is reactive via ES Proxy - when data changes, only the affected DOM bindings update. Components, routing, stores, and async tracking are all built in.'),
              { p: { children: ['See the ', { a: { href: '#full-example', text: 'Full Example: Task Board' } }, ' for a complete single-file app that exercises every feature.'] } },
              { p: { children: ['Using an LLM to write BlokJS code? Include the ', { a: { href: 'https://github.com/maleta/blokjs/blob/main/packages/blokjs/llm-reference.md', text: 'LLM Reference' } }, ' (~2,900 tokens) in your context for best results.'] } },
            ),

            // --- Browser Support ---
            sec('browser-support', 'Browser Support',
              { p: { children: ['BlokJS targets ES2020 and uses modern browser APIs. No polyfills or legacy fallbacks are included. The core dependency (ES Proxy) has ', { a: { href: 'https://caniuse.com/proxy', text: '96%+ global browser support' } }, ' per ', { a: { href: 'https://caniuse.com/', text: 'caniuse.com' } }, '.'] } },
              tbl(['Browser', 'Minimum Version'], [
                ['Chrome', '91+'],
                ['Edge', '91+'],
                ['Firefox', '88+'],
                ['Safari', '14.1+'],
                ['Internet Explorer', 'Not supported'],
              ]),
              sub('required-apis', 'Required APIs'),
              p('The framework relies on these modern JavaScript features:'),
              tbl(['API', 'Used For', 'Chrome', 'Firefox', 'Safari'], [
                ['ES Proxy / Reflect', 'Core reactivity system', '49+', '18+', '10+'],
                ['WeakMap / Set / Symbol', 'Dependency tracking and internal references', '36+', '6+', '9+'],
                [ic('queueMicrotask'), 'Batched DOM updates', '71+', '69+', '12.1+'],
                [ic('globalThis'), 'Environment detection', '71+', '65+', '12.1+'],
              ]),
              p([ic('structuredClone'), ' is used for deep cloning state and store data when available (Safari 15.4+, Chrome 98+), but is ', { strong: { text: 'not required' } }, ' - the framework falls back to a shallow copy on older browsers.']),
            ),

            // --- Quick Start ---
            sec('quick-start', 'Quick Start',
              sub('quick-start-cdn', 'CDN (No Build Step)'),
              p('Include BlokJS from a CDN and write your app in a single HTML file:'),
              c(`<!DOCTYPE html>\n<html>\n<head>\n  <meta charset="utf-8">\n  <script src="https://cdn.jsdelivr.net/npm/@maleta/blokjs/dist/blokjs.min.js"><\/script>\n</head>\n<body>\n  <div id="app"><\/div>\n  <script>\n    blok.mount('#app', {\n      state: { count: 0 },\n\n      methods: {\n        inc() { this.count++ },\n        dec() { this.count-- },\n      },\n\n      view: ($) => ({\n        div: { children: [\n          { h1: { text: $.count } },\n          { button: { click: 'dec', text: '-' } },\n          { button: { click: 'inc', text: '+' } },\n        ] }\n      })\n    })\n  <\/script>\n</body>\n</html>`, 'markup'),
              { p: { children: [
                'The CDN script exposes a global ',
                ic('blok'),
                ' object with ',
                ic('component'),
                ', ',
                ic('store'),
                ', and ',
                ic('mount'),
                ' methods. State is reactive - when count changes, the bound h1 updates automatically.',
              ] } },
              p('The vanilla approach gives you full control over loading. You can split components across separate files and load them on demand - no bundler decides what ships in your initial payload:'),
              c(`<!-- index.html -->\n<!DOCTYPE html>\n<html>\n<head>\n  <script src="https://cdn.jsdelivr.net/npm/@maleta/blokjs/dist/blokjs.min.js"><\/script>\n  <!-- Deferred scripts load in parallel but execute after HTML is parsed -->\n  <script src="/components/admin-panel.js" defer><\/script>\n</head>\n<body>\n  <div id="app"><\/div>\n  <script defer>\n    blok.mount('#app', {\n      view: () => ({ 'admin-panel': {} })\n    })\n  <\/script>\n</body>\n</html>`, 'markup'),
              c(`// components/admin-panel.js\nblok.component('AdminPanel', {\n  state: { users: [] },\n\n  mount() {\n    fetch('/api/users')\n      .then(r => r.json())\n      .then(data => { this.users = data })\n  },\n\n  view: ($) => ({\n    div: { children: [\n      { h2: { text: 'Admin Panel' } },\n      { ul: { children: $.users.map(u => ({ li: { text: u.name } })) } },\n    ] }\n  })\n})`),
              { p: { children: [
                'The ',
                ic('defer'),
                ' attribute tells the browser to download the script in parallel while parsing HTML, then execute it - in source order - once the document is fully parsed. This means ',
                ic('admin-panel.js'),
                ' registers the component before ',
                ic('blok.mount'),
                ' runs, with zero render-blocking.',
              ] } },
              sub('quick-start-vite', 'Vite (Build Tool)'),
              { p: { children: ['For larger projects, use the Vite plugin for auto-discovery, bundling, and HMR. See ', { a: { href: '#vite-plugin', text: 'Using with Vite' } }, '.'] } },
              { p: { children: ['Want to see every feature in one place? ', { a: { href: '#full-example', text: 'Jump to the Task Board \u2192' } }] } },
            ),

            // --- Using with Vite ---
            sec('vite-plugin', 'Using with Vite',
              p('While BlokJS works without a build step, the Vite plugin adds conveniences for larger projects: automatic component and store registration from file directories, bundling everything into optimized output, and hot module replacement during development.'),
              p('Scaffold a new project in one command:'),
              c(`npm create blokjs my-app\ncd my-app\nnpm install\nnpx vite`),
              sub('vite-manual', 'Manual Setup'),
              p('Add to an existing Vite project:'),
              c(`npm install blokjs vite-plugin-blokjs`),
              p('Project structure:'),
              c(`my-app/\n  index.html\n  main.js\n  vite.config.js\n  components/\n    counter.js\n  stores/\n    app.js`),
              c(`<!-- index.html -->\n<!DOCTYPE html>\n<html>\n<head><meta charset="utf-8"></head>\n<body>\n  <div id="app"></div>\n  <script type="module" src="/main.js"><\/script>\n</body>\n</html>`, 'markup'),
              c(`// vite.config.js\nimport { defineConfig } from 'vite'\nimport { blokjs } from 'vite-plugin-blokjs'\n\nexport default defineConfig({\n  plugins: [blokjs()],\n})`),
              c(`// main.js\nimport { mount } from '@maleta/blokjs'\nimport 'virtual:blokjs'\n\nmount('#app', {\n  view: ($) => ({ counter: {} }),\n})`),
              sub('vite-dev-build', 'Dev Server & Production Build'),
              c(`npx vite          # dev server with HMR\nnpx vite build    # bundle to dist/\nnpx vite preview  # preview the production build`),
              sub('vite-auto', 'Auto-Registration'),
              { p: { children: [
                'The plugin scans ',
                ic('components/'),
                ' and ',
                ic('stores/'),
                ' directories, registering each file by its filename. Files prefixed with ',
                ic('_'),
                ' are ignored.',
              ] } },
              c(`components/counter.js   -> component('counter', ...)\nstores/app.js           -> store('app', ...)\ncomponents/_helper.js   -> ignored`),
              p('Component and store files use default exports:'),
              c(`// components/counter.js\nexport default {\n  state: { count: 0 },\n  methods: {\n    increment() { this.count++ },\n    decrement() { this.count-- },\n  },\n  view: ($) => ({\n    div: { children: [\n      { h1: { text: $.count } },\n      { button: { click: 'decrement', text: '-' } },\n      { button: { click: 'increment', text: '+' } },\n    ] },\n  }),\n}`),
              sub('vite-options', 'Plugin Options'),
              c(`blokjs({\n  componentsDir: 'components', // default\n  storesDir: 'stores',         // default\n})`),
            ),

            // --- blok.component() ---
            sec('blokjs-component', 'blok.component(name, def)',
              p('Registers a reusable component. The name should start with an uppercase letter - lowercase names are treated as HTML elements, not components.'),
              c(`blok.component('UserCard', {
  props: ['name', 'email'],

  view: ($) => ({
    div: { class: 'card', children: [
      { h3: { text: $.name } },
      { p: { text: $.email } },
    ] }
  })
})`),
              p('Components are used in templates by name:'),
              c("{ UserCard: { name: 'Alice', email: 'alice@example.com' } }"),
              sub('component-def', 'Definition Shape'),
              tbl(['Property', 'Type', 'Description'], [
                [ic('props'), ic('string[]'), 'Property names the component accepts from its parent'],
                [ic('state'), ic('Record<string, any>'), 'Initial reactive state (deep cloned via structuredClone when available, shallow copy otherwise)'],
                [ic('computed'), ic('Record<string, fn>'), 'Derived getter functions. Not cached - re-evaluates on every read'],
                [ic('watch'), ic('Record<string, fn>'), 'Watchers for top-level state/prop changes. Receives (newVal, oldVal)'],
                [ic('methods'), ic('Record<string, fn>'), 'Instance methods. Async methods get automatic loading/error tracking'],
                [ic('mount'), ic('fn'), 'Called after the component is inserted into the DOM'],
                [ic('unmount'), ic('fn'), 'Called when the component is destroyed'],
                [ic('view'), ic('($) => object'), 'Returns a template object describing the UI. Required'],
              ]),
              { p: { children: ['Only ', ic('view'), ' is required. All other properties are optional.'] } },
            ),

            // --- blok.mount() ---
            sec('blokjs-mount', 'blok.mount(target, opts)',
              p('Mounts the root application onto a DOM element. Returns an object with a destroy() method.'),
              c(`const app = blok.mount('#app', {
  state: { count: 0 },
  view: ($) => ({ div: { text: $.count } })
})

// Tear down later
app.destroy()`),
              { p: { children: [
                'The ',
                ic('target'),
                ' can be a CSS selector string or an HTMLElement. Calling ',
                ic('blok.mount()'),
                ' again without first calling ',
                ic('destroy()'),
                ' throws an error. After ',
                ic('destroy()'),
                ', all component and store registrations are lost - re-register them before mounting again.',
              ] } },
              sub('mount-options', 'Root-Only Options'),
              { p: { children: [
                ic('blok.mount()'),
                ' accepts all component definition options (props, state, computed, watch, methods, mount, unmount, view) plus these root-only options for ',
                { a: { href: '#router', text: 'routing' } },
                ':',
              ] } },
              tbl(['Option', 'Type', 'Description'], [
                [ic('routes'), ic('RouteConfig[]'), 'Route definitions for client-side routing'],
                [ic('guards'), ic('Record<string, fn>'), 'Named route guard functions'],
                [ic('mode'), ic("'hash' | 'history' | 'auto'"), "Router mode (default: 'auto'). 'auto' uses hash for file:// URLs, history otherwise"],
              ]),
            ),

            // --- blok.store() ---
            sec('blokjs-store', 'blok.store(name, def)',
              p('Registers a named store with structured state, computed properties, and methods. Call before blok.mount().'),
              c(`blok.store('auth', {
  state: { user: null, token: null },

  computed: {
    isLoggedIn() { return this.user !== null }
  },

  methods: {
    logout() { this.user = null; this.token = null },
    async login(email, password) {
      const res = await fetch('/api/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      })
      const data = await res.json()
      this.user = data.user
      this.token = data.token
    }
  }
})`),
              tbl(['Property', 'Type', 'Description'], [
                [ic('state'), ic('Record<string, any>'), 'Initial reactive state (deep cloned via structuredClone when available, shallow copy otherwise)'],
                [ic('computed'), ic('Record<string, fn>'), 'Derived values. this refers to the store proxy.'],
                [ic('methods'), ic('Record<string, fn>'), 'Actions. this refers to the store proxy. Async methods get automatic loading/error tracking. Store methods cannot access other stores via this — use component methods for cross-store interaction.'],
              ]),
              sub('store-access', 'Accessing Stores'),
              c(`// In methods / lifecycle
this.store.auth.user          // state
this.store.auth.isLoggedIn    // computed
this.store.auth.login(e, p)   // method

// In templates
{ span: { text: $.store.auth.user.name } }
{ when: $.store.auth.isLoggedIn, children: [...] }`),
              sub('store-loading', 'Store Loading & Error'),
              { p: { children: [
                'Async store methods automatically get ',
                ic('loading'),
                ' and ',
                ic('error'),
                ' tracking (same pattern as ',
                { a: { href: '#async-methods', text: 'component async methods' } },
                '):',
              ] } },
              c(`// In templates
{ when: $.store.auth.loading.login, children: [
  { p: 'Signing in...' }
] }

{ when: $.store.auth.error.login, children: [
  { p: { class: 'error', text: $.store.auth.error.login } }
] }

// In methods
this.store.auth.loading.login  // true while running
this.store.auth.error.login    // rejection value (typically Error) or null`),
            ),

            // --- Context ---
            sec('context', 'Context (this)',
              { p: { children: [
                'Inside methods, computed, watch, and lifecycle hooks, ',
                ic('this'),
                ' provides access to:',
              ] } },
              tbl(['Property', 'Description'], [
                [ic('this.<state>'), 'Read/write local state properties'],
                [ic('this.<computed>'), 'Read computed values'],
                [ic('this.<method>()'), 'Call methods'],
                [ic('this.<prop>'), 'Read props passed by parent'],
                [ic('this.store'), 'Access named stores via this.store.<name> (read/write)'],
                [ic('this.loading'), 'Reactive loading state for async methods - this.loading.<method> is true while running'],
                [ic('this.error'), 'Reactive error state for async methods - this.error.<method> holds the Error or null'],
                [ic('this.route'), '{ path, params, query } - current route info'],
                [ic('this.refs'), 'Object of named DOM element references'],
                [ic('this.el'), 'The component\'s root DOM element'],
                [ic('this.emit(event, payload?)'), 'Emit an event to the parent component'],
                [ic('this.navigate(to)'), 'Navigate to a path (string) or history offset (number)'],
              ]),
              c(`methods: {
  save() {
    this.store.myStore.items.push({ name: this.name })  // write to store
    this.name = ''                                // write to state
    this.emit('saved')                            // notify parent
    this.navigate('/')                            // go to home
    this.refs.input.focus()                       // access DOM
    console.log(this.route.params.id)             // read route
    console.log(this.total)                       // read computed
  }
}`),
              note('These names are reserved and cannot be used as state properties: store, loading, error, refs, el, route, emit, navigate.'),
            ),

            // --- Props ---
            sec('props', 'Props',
              p('An array of property names the component accepts from its parent.'),
              c(`blok.component('Badge', {
  props: ['label', 'color'],

  view: ($) => ({
    span: {
      class: 'badge',
      style: { backgroundColor: $.color },
      text: $.label,
    }
  })
})

// Usage
{ Badge: { label: 'New', color: '#f59e0b' } }`),
              { p: { children: [
                'Props passed as ',
                ic('$'),
                ' refs are reactive — changes in the parent automatically update the child. Writing to a prop in the child writes back to the parent.',
              ] } },
              note('The props array is declarative — BlokJS does not validate that passed props match the list. Any property passed to a component becomes a prop regardless.'),
            ),

            // --- State ---
            sec('state', 'State',
              p('Initial local reactive state. Each component instance gets a deep clone (via structuredClone when available, shallow copy otherwise). If state contains non-cloneable values (functions, DOM elements), a shallow copy is used instead.'),
              c(`state: { count: 0, items: [], filter: '' }`),
              { p: { children: [
                'Access and modify state on ',
                ic('this'),
                ' inside methods, computed, watch, and lifecycle hooks:',
              ] } },
              c(`methods: {
  add() {
    this.items.push({ name: this.newItem })
    this.newItem = ''
  }
}`),
            ),

            // --- Computed ---
            sec('computed', 'Computed',
              p('Derived getter functions. Not cached — the function re-evaluates every time it is read. Keep them lightweight.'),
              c(`computed: {
  filtered() {
    return this.items.filter(i => i.name.includes(this.filter))
  },
  total() {
    return this.items.length
  }
}`),
              { p: { children: [
                'Access computed values like state: ',
                ic('this.total'),
                ' or in templates via ',
